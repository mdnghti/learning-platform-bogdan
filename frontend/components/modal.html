<div class="modal-overlay" id="genericModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Modal Title</h3>
      <button class="modal-close" onclick="closeModal('genericModal')">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter">
      <button class="btn btn-ghost" onclick="closeModal('genericModal')">Cancel</button>
      <button class="btn btn-primary" id="modalConfirmBtn">Confirm</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="newTopicModal">
  <div class="modal">
    <div class="modal-header">
      <h3>New Topic</h3>
      <button class="modal-close" onclick="closeNewTopicModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Title</label>
        <input type="text" class="form-control" id="topicTitle" placeholder="Enter topic title">
      </div>
      <div class="form-group">
        <label>Content</label>
        <textarea class="form-control" id="topicContent" placeholder="Write your topic content..." rows="4"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeNewTopicModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createTopic()">Create Topic</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addEventModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Event</h3>
      <button class="modal-close" onclick="closeAddEventModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Title</label>
        <input type="text" class="form-control" id="eventTitle" placeholder="Event title">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea class="form-control" id="eventDescription" placeholder="Event description" rows="3"></textarea>
      </div>
      <div class="grid grid-2">
        <div class="form-group">
          <label>Type</label>
          <select class="form-control" id="eventType">
            <option value="other">Other</option>
            <option value="class">Class</option>
            <option value="office_hours">Office Hours</option>
            <option value="test">Test</option>
          </select>
        </div>
        <div class="form-group">
          <label>All Day</label>
          <select class="form-control" id="eventAllDay">
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Start Date</label>
        <input type="datetime-local" class="form-control" id="eventStartDate">
      </div>
      <div class="form-group">
        <label>End Date</label>
        <input type="datetime-local" class="form-control" id="eventEndDate">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAddEventModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addEvent()">Add Event</button>
    </div>
  </div>
</div>
