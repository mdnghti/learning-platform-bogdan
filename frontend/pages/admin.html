<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - LearnHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="dashboard-layout">
    <div id="sidebarContainer"></div>
    <main class="main-content">
      <div id="navbarContainer"></div>
      <div class="content-area">
        <div class="page-header">
          <h1>Admin Panel</h1>
        </div>
        <div class="section-tabs">
          <button class="active" onclick="switchAdminTab('users', this)">Users</button>
          <button onclick="switchAdminTab('courses', this)">Courses</button>
          <button onclick="switchAdminTab('statistics', this)">Statistics</button>
        </div>
        <div id="adminContent">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    let currentTab = 'users';

    document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();
      const sidebarContainer = document.getElementById('sidebarContainer');
      const navbarContainer = document.getElementById('navbarContainer');

      if (sidebarContainer) {
        const sidebarHTML = await fetch('/components/sidebar.html').then(r => r.text());
        sidebarContainer.innerHTML = sidebarHTML;
      }
      if (navbarContainer) {
        const navbarHTML = await fetch('/components/navbar.html').then(r => r.text());
        navbarContainer.innerHTML = navbarHTML;
      }

      await initAuth();
      loadAdminTab('users');
    });

    function switchAdminTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.section-tabs button').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      loadAdminTab(tab);
    }

    async function loadAdminTab(tab) {
      const container = document.getElementById('adminContent');
      container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

      switch (tab) {
        case 'users': loadUsers(container); break;
        case 'courses': loadCourses(container); break;
        case 'statistics': loadStats(container); break;
      }
    }

    async function loadUsers(container) {
      try {
        const data = await api.get('/admin/users');

        container.innerHTML = `
          <div class="admin-search">
            <input type="text" id="userSearch" placeholder="Search users..." oninput="filterUsers()">
          </div>
          <div style="overflow-x:auto">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Joined</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                ${data.users
                  .map(
                    (u) => `
                  <tr>
                    <td>${u.firstName} ${u.lastName}</td>
                    <td class="text-sm">${u.email}</td>
                    <td>
                      <select class="form-control text-sm" style="padding:0.25rem;width:auto" onchange="updateUserRole('${u._id}', this.value)">
                        <option value="student" ${u.role === 'student' ? 'selected' : ''}>Student</option>
                        <option value="teacher" ${u.role === 'teacher' ? 'selected' : ''}>Teacher</option>
                        <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                      </select>
                    </td>
                    <td>
                      <span class="badge ${u.isActive ? 'badge-success' : 'badge-danger'}">${u.isActive ? 'Active' : 'Inactive'}</span>
                    </td>
                    <td class="text-sm text-muted">${new Date(u.createdAt).toLocaleDateString()}</td>
                    <td>
                      <div class="actions">
                        <button class="btn btn-sm ${u.isActive ? 'btn-secondary' : 'btn-success'}" onclick="toggleUserStatus('${u._id}')">
                          ${u.isActive ? 'Deactivate' : 'Activate'}
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteUser('${u._id}')">Delete</button>
                      </div>
                    </td>
                  </tr>
                `
                  )
                  .join('')}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        container.innerHTML = `<div class="alert alert-error">Failed to load users: ${error.message}</div>`;
      }
    }

    function filterUsers() {
      const search = document.getElementById('userSearch')?.value.toLowerCase();
      if (!search) {
        document.querySelectorAll('#usersTableBody tr').forEach(tr => tr.style.display = '');
        return;
      }
      document.querySelectorAll('#usersTableBody tr').forEach(tr => {
        const text = tr.textContent.toLowerCase();
        tr.style.display = text.includes(search) ? '' : 'none';
      });
    }

    async function updateUserRole(userId, role) {
      try {
        await api.put(`/admin/users/${userId}/role`, { role });
        showAlert('Role updated', 'success');
      } catch (error) {
        showAlert(error.message || 'Failed to update role', 'error');
      }
    }

    async function toggleUserStatus(userId) {
      try {
        await api.put(`/admin/users/${userId}/toggle-status`);
        loadAdminTab('users');
      } catch (error) {
        showAlert(error.message || 'Failed to toggle status', 'error');
      }
    }

    async function deleteUser(userId) {
      if (!confirm('Are you sure you want to delete this user?')) return;
      try {
        await api.delete(`/admin/users/${userId}`);
        showAlert('User deleted', 'success');
        loadAdminTab('users');
      } catch (error) {
        showAlert(error.message || 'Failed to delete user', 'error');
      }
    }

    async function loadCourses(container) {
      try {
        const data = await api.get('/admin/courses');

        container.innerHTML = `
          <div style="overflow-x:auto">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Teacher</th>
                  <th>Students</th>
                  <th>Status</th>
                  <th>Created</th>
                </tr>
              </thead>
              <tbody>
                ${data.courses
                  .map(
                    (c) => `
                  <tr>
                    <td>${c.title}</td>
                    <td class="text-sm">${c.teacher?.firstName || ''} ${c.teacher?.lastName || ''}</td>
                    <td>${c.students?.length || 0}</td>
                    <td>
                      <span class="badge ${c.isPublished ? 'badge-success' : 'badge-warning'}">${c.isPublished ? 'Published' : 'Draft'}</span>
                    </td>
                    <td class="text-sm text-muted">${new Date(c.createdAt).toLocaleDateString()}</td>
                  </tr>
                `
                  )
                  .join('')}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        container.innerHTML = `<div class="alert alert-error">Failed to load courses: ${error.message}</div>`;
      }
    }

    async function loadStats(container) {
      try {
        const data = await api.get('/admin/statistics');
        const stats = data.statistics;

        container.innerHTML = `
          <div class="admin-stats">
            <div class="admin-stat-card">
              <div class="stat-number">${stats.totalUsers}</div>
              <div class="stat-label">Total Users</div>
            </div>
            <div class="admin-stat-card">
              <div class="stat-number">${stats.totalStudents}</div>
              <div class="stat-label">Students</div>
            </div>
            <div class="admin-stat-card">
              <div class="stat-number">${stats.totalTeachers}</div>
              <div class="stat-label">Teachers</div>
            </div>
            <div class="admin-stat-card">
              <div class="stat-number">${stats.totalCourses}</div>
              <div class="stat-label">Courses</div>
            </div>
            <div class="admin-stat-card">
              <div class="stat-number">${stats.publishedCourses}</div>
              <div class="stat-label">Published Courses</div>
            </div>
            <div class="admin-stat-card">
              <div class="stat-number">${stats.totalGrades}</div>
              <div class="stat-label">Grades Given</div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <h3>Platform Overview</h3>
            </div>
            <div class="grid grid-2">
              <div class="card">
                <h4 class="text-sm mb-2">User Distribution</h4>
                <div class="flex gap-2">
                  <span class="badge badge-primary">${stats.totalStudents} Students</span>
                  <span class="badge badge-warning">${stats.totalTeachers} Teachers</span>
                  <span class="badge badge-danger">${stats.totalUsers - stats.totalStudents - stats.totalTeachers} Admins</span>
                </div>
              </div>
              <div class="card">
                <h4 class="text-sm mb-2">Course Status</h4>
                <div class="flex gap-2">
                  <span class="badge badge-success">${stats.publishedCourses} Published</span>
                  <span class="badge badge-warning">${stats.totalCourses - stats.publishedCourses} Drafts</span>
                </div>
              </div>
            </div>
          </div>
        `;
      } catch (error) {
        container.innerHTML = `<div class="alert alert-error">Failed to load statistics: ${error.message}</div>`;
      }
    }
  </script>
</body>
</html>
