<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignments - LearnHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <div class="dashboard-layout">
    <div id="sidebarContainer"></div>
    <main class="main-content">
      <div id="navbarContainer"></div>
      <div class="content-area">
        <div class="page-header">
          <h1>Assignments</h1>
          <div class="flex gap-1">
            <button class="btn btn-secondary btn-sm" onclick="window.location.href='/pages/courses.html'">Browse Courses</button>
          </div>
        </div>
        <div class="card mb-3">
          <p class="text-sm text-muted">Select a course to view its assignments, or use the course detail page to create new ones.</p>
        </div>
        <div id="assignmentsContainer">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="submitModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="submitModalTitle">Submit Assignment</h3>
        <button class="modal-close" onclick="closeSubmitModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="submitAssignmentId">
        <div class="form-group">
          <label>Your Answer</label>
          <textarea class="form-control" id="submitContent" placeholder="Write your answer..." rows="4"></textarea>
        </div>
        <div class="form-group">
          <label>Upload File</label>
          <input type="file" class="form-control" id="submitFile">
          <span class="text-xs text-muted mt-1">Optional. Max 10MB.</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeSubmitModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitAssignment()">Submit</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/assignments.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();
      const sidebarContainer = document.getElementById('sidebarContainer');
      const navbarContainer = document.getElementById('navbarContainer');

      if (sidebarContainer) {
        const sidebarHTML = await fetch('/components/sidebar.html').then(r => r.text());
        sidebarContainer.innerHTML = sidebarHTML;
      }
      if (navbarContainer) {
        const navbarHTML = await fetch('/components/navbar.html').then(r => r.text());
        navbarContainer.innerHTML = navbarHTML;
      }

      await initAuth();
    });
  </script>
</body>
</html>
