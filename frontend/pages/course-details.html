<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Details - LearnHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/courses.css">
</head>
<body>
  <div class="dashboard-layout">
    <div id="sidebarContainer"></div>
    <main class="main-content">
      <div id="navbarContainer"></div>
      <div class="content-area">
        <div id="courseDetail">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="createModuleModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Add Module</h3>
        <button class="modal-close" onclick="closeCreateModuleModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="moduleCourseId">
        <div class="form-group">
          <label>Module Title</label>
          <input type="text" class="form-control" id="moduleTitle" placeholder="Enter module title">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeCreateModuleModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createModule()">Create Module</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="addMaterialModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Add Material</h3>
        <button class="modal-close" onclick="closeAddMaterialModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="materialModuleId">
        <input type="hidden" id="materialCourseId">
        <div class="form-group">
          <label>Title</label>
          <input type="text" class="form-control" id="materialTitle" placeholder="Material title">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select class="form-control" id="materialType">
            <option value="document">Document</option>
            <option value="video">Video</option>
            <option value="presentation">Presentation</option>
            <option value="link">Link</option>
          </select>
        </div>
        <div class="form-group">
          <label>Content / URL</label>
          <textarea class="form-control" id="materialContent" placeholder="Write content or paste URL..." rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeAddMaterialModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addMaterial()">Add Material</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="createAssignmentModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Create Assignment</h3>
        <button class="modal-close" onclick="closeCreateAssignmentModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="assignmentCourseId">
        <div class="form-group">
          <label>Title</label>
          <input type="text" class="form-control" id="assignmentTitle" placeholder="Assignment title">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea class="form-control" id="assignmentDescription" placeholder="Describe the assignment..." rows="3"></textarea>
        </div>
        <div class="grid grid-2">
          <div class="form-group">
            <label>Max Score</label>
            <input type="number" class="form-control" id="assignmentMaxScore" value="100">
          </div>
          <div class="form-group">
            <label>Due Date</label>
            <input type="date" class="form-control" id="assignmentDueDate">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeCreateAssignmentModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createAssignment()">Create Assignment</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="createTestModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Create Test</h3>
        <button class="modal-close" onclick="closeCreateTestModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="testCourseId">
        <div class="form-group">
          <label>Title</label>
          <input type="text" class="form-control" id="testTitle" placeholder="Test title">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea class="form-control" id="testDescription" placeholder="Describe the test..." rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>Passing Score (%)</label>
          <input type="number" class="form-control" id="testPassingScore" value="60" min="0" max="100">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeCreateTestModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createTest()">Create Test</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/courses.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();
      const sidebarContainer = document.getElementById('sidebarContainer');
      const navbarContainer = document.getElementById('navbarContainer');

      if (sidebarContainer) {
        const sidebarHTML = await fetch('/components/sidebar.html').then(r => r.text());
        sidebarContainer.innerHTML = sidebarHTML;
      }
      if (navbarContainer) {
        const navbarHTML = await fetch('/components/navbar.html').then(r => r.text());
        navbarContainer.innerHTML = navbarHTML;
      }

      await initAuth();
      loadCourseDetails();
    });
  </script>
</body>
</html>
