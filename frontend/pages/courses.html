<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses - LearnHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/courses.css">
</head>
<body>
  <div class="dashboard-layout">
    <div id="sidebarContainer"></div>
    <main class="main-content">
      <div id="navbarContainer"></div>
      <div class="content-area">
        <div class="page-header">
          <h1>Courses</h1>
          <div id="coursesActions"></div>
        </div>
        <div class="filters">
          <select id="categoryFilter">
            <option value="">All Categories</option>
            <option value="programming">Programming</option>
            <option value="web">Web Development</option>
            <option value="data">Data Science</option>
            <option value="devops">DevOps</option>
          </select>
          <select id="difficultyFilter">
            <option value="">All Levels</option>
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
        </div>
        <div id="coursesContainer">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="createCourseModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Create New Course</h3>
        <button class="modal-close" onclick="closeCreateCourseModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Course Title</label>
          <input type="text" class="form-control" id="courseTitle" placeholder="Enter course title">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea class="form-control" id="courseDescription" placeholder="Describe your course..." rows="4"></textarea>
        </div>
        <div class="grid grid-2">
          <div class="form-group">
            <label>Category</label>
            <select class="form-control" id="courseCategory">
              <option value="programming">Programming</option>
              <option value="web">Web Development</option>
              <option value="data">Data Science</option>
              <option value="devops">DevOps</option>
            </select>
          </div>
          <div class="form-group">
            <label>Difficulty</label>
            <select class="form-control" id="courseDifficulty">
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeCreateCourseModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createCourse()">Create Course</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/courses.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();
      const sidebarContainer = document.getElementById('sidebarContainer');
      const navbarContainer = document.getElementById('navbarContainer');

      if (sidebarContainer) {
        const sidebarHTML = await fetch('/components/sidebar.html').then(r => r.text());
        sidebarContainer.innerHTML = sidebarHTML;
      }
      if (navbarContainer) {
        const navbarHTML = await fetch('/components/navbar.html').then(r => r.text());
        navbarContainer.innerHTML = navbarHTML;
      }

      await initAuth();

      const user = await loadUser();
      const isTeacher = user?.role === 'teacher' || user?.role === 'admin';
      const actions = document.getElementById('coursesActions');
      if (isTeacher && actions) {
        actions.innerHTML = `
          <button class="btn btn-primary btn-sm" onclick="openCreateCourseModal()">+ New Course</button>
          <a href="/pages/courses.html?view=my" class="btn btn-secondary btn-sm">My Courses</a>
        `;
      }
    });
  </script>
</body>
</html>
