<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forum - LearnHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/forum.css">
</head>
<body>
  <div class="dashboard-layout">
    <div id="sidebarContainer"></div>
    <main class="main-content">
      <div id="navbarContainer"></div>
      <div class="content-area">
        <div class="page-header">
          <h1>Forum</h1>
        </div>
        <div id="topicsContainer">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <div id="modalContainer"></div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/forum.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();
      const sidebarContainer = document.getElementById('sidebarContainer');
      const navbarContainer = document.getElementById('navbarContainer');
      const modalContainer = document.getElementById('modalContainer');

      if (sidebarContainer) {
        const sidebarHTML = await fetch('/components/sidebar.html').then(r => r.text());
        sidebarContainer.innerHTML = sidebarHTML;
      }
      if (navbarContainer) {
        const navbarHTML = await fetch('/components/navbar.html').then(r => r.text());
        navbarContainer.innerHTML = navbarHTML;
      }
      if (modalContainer) {
        const modalHTML = await fetch('/components/modal.html').then(r => r.text());
        modalContainer.innerHTML = modalHTML;
      }

      await initAuth();
    });
  </script>
</body>
</html>
