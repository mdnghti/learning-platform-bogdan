<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnHub - Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <div class="dashboard-layout">
    <div id="sidebarContainer"></div>
    <main class="main-content">
      <div id="navbarContainer"></div>
      <div class="content-area">
        <div class="page-header">
          <h1>Dashboard</h1>
          <div id="dashboardActions"></div>
        </div>
        <div id="dashboardContent">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();

      const sidebarContainer = document.getElementById('sidebarContainer');
      if (sidebarContainer) {
        const sidebarHTML = await fetch('/components/sidebar.html').then(r => r.text());
        sidebarContainer.innerHTML = sidebarHTML;
      }

      const navbarContainer = document.getElementById('navbarContainer');
      if (navbarContainer) {
        const navbarHTML = await fetch('/components/navbar.html').then(r => r.text());
        navbarContainer.innerHTML = navbarHTML;
      }

      await initAuth();
      loadDashboard();
    });

    async function loadDashboard() {
      const container = document.getElementById('dashboardContent');
      const actions = document.getElementById('dashboardActions');
      if (!container) return;

      try {
        const user = await loadUser();

        if (user.role === 'admin') {
          loadAdminDashboard(container);
          return;
        }

        let coursesData = { courses: [] };
        try {
          coursesData = await api.get('/courses?limit=3');
        } catch {}

        let gradesData = { statistics: {} };
        try {
          gradesData = await api.get('/grades/statistics');
        } catch {}

        let notificationsData = { unreadCount: 0 };
        try {
          notificationsData = await api.get('/notifications');
        } catch {}

        if (actions) {
          actions.innerHTML = `
            <a href="/pages/courses.html" class="btn btn-primary btn-sm">Browse Courses</a>
          `;
        }

        container.innerHTML = `
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label">Available Courses</div>
              <div class="stat-value">${coursesData.total || 0}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Average Grade</div>
              <div class="stat-value">${gradesData.statistics?.averagePercentage || 0}%</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Notifications</div>
              <div class="stat-value">${notificationsData.unreadCount || 0}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Role</div>
              <div class="stat-value" style="text-transform:capitalize">${user.role}</div>
            </div>
          </div>

          <div class="card mt-3">
            <div class="card-header">
              <h3>Welcome, ${user.firstName}!</h3>
            </div>
            <p>Use the sidebar to navigate through the platform. Browse courses, check your grades, participate in forum discussions, and more.</p>
            <div class="flex gap-2 mt-2">
              <a href="/pages/courses.html" class="btn btn-primary">📚 Browse Courses</a>
              <a href="/pages/grades.html" class="btn btn-secondary">⭐ My Grades</a>
              <a href="/pages/forum.html" class="btn btn-secondary">💬 Forum</a>
            </div>
          </div>

          <div class="card mt-3">
            <div class="card-header">
              <h3>Recent Courses</h3>
            </div>
            ${coursesData.courses?.length
              ? '<div class="course-grid" style="grid-template-columns:repeat(auto-fill,minmax(250px,1fr))">' +
                coursesData.courses
                  .map(
                    (c) => `
                    <div class="course-card" onclick="window.location.href='/pages/course-details.html?id=${c._id}'">
                      <div class="course-card-thumb">📚</div>
                      <div class="course-card-body">
                        <h3>${c.title}</h3>
                        <p>${c.description?.substring(0, 80) || ''}${c.description?.length > 80 ? '...' : ''}</p>
                        <div class="course-card-meta">
                          <span>${c.teacher?.firstName || ''} ${c.teacher?.lastName || ''}</span>
                        </div>
                      </div>
                    </div>
                  `
                  )
                  .join('') +
                '</div>'
              : '<p class="text-muted">No courses available yet.</p>'}
          </div>
        `;
      } catch (error) {
        container.innerHTML = `<div class="alert alert-error">Failed to load dashboard: ${error.message}</div>`;
      }
    }

    async function loadAdminDashboard(container) {
      try {
        const data = await api.get('/admin/statistics');
        const stats = data.statistics;

        container.innerHTML = `
          <div class="admin-stats">
            <div class="admin-stat-card">
              <div class="stat-number">${stats.totalUsers}</div>
              <div class="stat-label">Total Users</div>
            </div>
            <div class="admin-stat-card">
              <div class="stat-number">${stats.totalStudents}</div>
              <div class="stat-label">Students</div>
            </div>
            <div class="admin-stat-card">
              <div class="stat-number">${stats.totalTeachers}</div>
              <div class="stat-label">Teachers</div>
            </div>
            <div class="admin-stat-card">
              <div class="stat-number">${stats.totalCourses}</div>
              <div class="stat-label">Courses</div>
            </div>
            <div class="admin-stat-card">
              <div class="stat-number">${stats.publishedCourses}</div>
              <div class="stat-label">Published</div>
            </div>
            <div class="admin-stat-card">
              <div class="stat-number">${stats.totalGrades}</div>
              <div class="stat-label">Grades Given</div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <h3>Admin Panel</h3>
            </div>
            <p>Use the admin panel to manage users, courses, and view platform statistics.</p>
            <div class="flex gap-2 mt-2">
              <a href="/pages/admin.html" class="btn btn-primary">👥 Manage Users</a>
              <a href="/pages/courses.html" class="btn btn-secondary">📚 Manage Courses</a>
            </div>
          </div>
        `;

        if (data.recentUsers?.length) {
          container.innerHTML += `
            <div class="card mt-3">
              <div class="card-header">
                <h3>Recent Users</h3>
              </div>
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Joined</th>
                  </tr>
                </thead>
                <tbody>
                  ${data.recentUsers
                    .map(
                      (u) => `
                    <tr>
                      <td>${u.firstName} ${u.lastName}</td>
                      <td>${u.email}</td>
                      <td><span class="badge badge-primary">${u.role}</span></td>
                      <td class="text-sm text-muted">${new Date(u.createdAt).toLocaleDateString()}</td>
                    </tr>
                  `
                    )
                    .join('')}
                </tbody>
              </table>
            </div>
          `;
        }
      } catch (error) {
        container.innerHTML = `<div class="alert alert-error">Failed to load admin dashboard: ${error.message}</div>`;
      }
    }

    function toggleSidebar() {
      document.querySelector('.sidebar')?.classList.toggle('open');
    }

    function closeModal(id) {
      document.getElementById(id)?.classList.remove('active');
    }
  </script>
</body>
</html>
