<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LearnHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your account</p>
    <div id="errorMessage"></div>
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" id="email" placeholder="Enter your email" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
    <div class="form-footer">
      Don't have an account? <a href="/pages/register.html">Register</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      redirectIfAuthenticated();
    });

    function redirectIfAuthenticated() {
      const token = api.getToken();
      if (token) {
        window.location.href = '/pages/index.html';
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMessage');

      errorDiv.innerHTML = '';

      try {
        const data = await api.post('/auth/login', { email, password });
        api.setToken(data.token);
        window.location.href = '/pages/index.html';
      } catch (error) {
        errorDiv.innerHTML = `<div class="alert alert-error">${error.message || 'Login failed'}</div>`;
      }
    });
  </script>
</body>
</html>
