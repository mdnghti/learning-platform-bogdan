<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - LearnHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <div class="dashboard-layout">
    <div id="sidebarContainer"></div>
    <main class="main-content">
      <div id="navbarContainer"></div>
      <div class="content-area">
        <div class="page-header">
          <h1>My Profile</h1>
        </div>
        <div id="profileContent">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();
      const sidebarContainer = document.getElementById('sidebarContainer');
      const navbarContainer = document.getElementById('navbarContainer');

      if (sidebarContainer) {
        const sidebarHTML = await fetch('/components/sidebar.html').then(r => r.text());
        sidebarContainer.innerHTML = sidebarHTML;
      }
      if (navbarContainer) {
        const navbarHTML = await fetch('/components/navbar.html').then(r => r.text());
        navbarContainer.innerHTML = navbarHTML;
      }

      await initAuth();
      loadProfile();
    });

    async function loadProfile() {
      const container = document.getElementById('profileContent');
      try {
        const user = await loadUser();
        if (!user) {
          container.innerHTML = '<div class="alert alert-error">Please log in</div>';
          return;
        }

        const initials = ((user.firstName?.[0] || '') + (user.lastName?.[0] || '')).toUpperCase() || '?';
        container.innerHTML = `
          <div class="card mb-3">
            <div class="flex gap-2" style="align-items:start">
              <div style="flex-shrink:0">
                <div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--primary-light),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:white">${initials}</div>
              </div>
              <div style="padding-top:0.5rem">
                <h2>${user.firstName} ${user.lastName}</h2>
                <p class="text-muted text-sm">${user.email}</p>
                <span class="badge badge-primary mt-1">${user.role}</span>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <h3>Edit Profile</h3>
            </div>
            <form id="profileForm">
              <div class="grid grid-2">
                <div class="form-group">
                  <label>First Name</label>
                  <input type="text" class="form-control" id="editFirstName" value="${user.firstName || ''}">
                </div>
                <div class="form-group">
                  <label>Last Name</label>
                  <input type="text" class="form-control" id="editLastName" value="${user.lastName || ''}">
                </div>
              </div>
              <div class="form-group">
                <label>Bio</label>
                <textarea class="form-control" id="editBio" rows="3">${user.bio || ''}</textarea>
              </div>
              <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
          </div>

          <div class="card mt-3">
            <div class="card-header">
              <h3>Change Password</h3>
            </div>
            <form id="passwordForm">
              <div class="form-group">
                <label>Current Password</label>
                <input type="password" class="form-control" id="currentPassword" required>
              </div>
              <div class="form-group">
                <label>New Password</label>
                <input type="password" class="form-control" id="newPassword" required minlength="6">
              </div>
              <button type="submit" class="btn btn-primary">Update Password</button>
            </form>
          </div>
        `;

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          try {
            await api.put('/users/profile', {
              firstName: document.getElementById('editFirstName').value,
              lastName: document.getElementById('editLastName').value,
              bio: document.getElementById('editBio').value,
            });
            showAlert('Profile updated!', 'success');
          } catch (error) {
            showAlert(error.message || 'Failed to update profile', 'error');
          }
        });

        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          try {
            await api.put('/users/password', {
              currentPassword: document.getElementById('currentPassword').value,
              newPassword: document.getElementById('newPassword').value,
            });
            showAlert('Password updated!', 'success');
            document.getElementById('passwordForm').reset();
          } catch (error) {
            showAlert(error.message || 'Failed to update password', 'error');
          }
        });
      } catch (error) {
        container.innerHTML = `<div class="alert alert-error">Failed to load profile: ${error.message}</div>`;
      }
    }
  </script>
</body>
</html>
