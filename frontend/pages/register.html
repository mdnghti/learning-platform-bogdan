<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - LearnHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>Create Account</h1>
    <p class="subtitle">Join the learning platform</p>
    <div id="errorMessage"></div>
    <form id="registerForm">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" class="form-control" id="firstName" placeholder="First name" required>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" class="form-control" id="lastName" placeholder="Last name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" id="password" placeholder="Min 6 characters" required minlength="6">
      </div>
      <div class="form-group">
        <label>Role</label>
        <select class="form-control" id="role">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>
    <div class="form-footer">
      Already have an account? <a href="/pages/login.html">Sign In</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      const errorDiv = document.getElementById('errorMessage');

      errorDiv.innerHTML = '';

      try {
        const data = await api.post('/auth/register', { firstName, lastName, email, password, role });
        api.setToken(data.token);
        window.location.href = '/pages/index.html';
      } catch (error) {
        errorDiv.innerHTML = `<div class="alert alert-error">${error.message || 'Registration failed'}</div>`;
      }
    });
  </script>
</body>
</html>
